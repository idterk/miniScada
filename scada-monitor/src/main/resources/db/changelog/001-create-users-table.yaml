databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: scada-team
      changes:
        - createTable:
            tableName: users
            remarks: "System users table"
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  remarks: "Primary key (UUID)"
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  remarks: "Unique username"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  remarks: "Hashed password"
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(100)
                  remarks: "Unique email address"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: full_name
                  type: VARCHAR(100)
                  remarks: "User's full name"
              - column:
                  name: role
                  type: VARCHAR(20)
                  remarks: "User role: ADMIN, ENGINEER, OPERATOR"
                  constraints:
                    nullable: false
              - column:
                  name: is_enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  remarks: "Account enabled flag"
              - column:
                  name: is_locked
                  type: BOOLEAN
                  defaultValueBoolean: false
                  remarks: "Account locked flag"
              - column:
                  name: last_login
                  type: TIMESTAMP
                  remarks: "Last login timestamp"
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  remarks: "Creation timestamp"
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  remarks: "Last update timestamp"