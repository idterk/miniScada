databaseChangeLog:
  - changeSet:
      id: 005-create-user-audit-log-table
      author: scada-team
      changes:
        - createTable:
            tableName: user_audit_log
            remarks: "User actions audit log"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: VARCHAR(36)
              - column:
                  name: username
                  type: VARCHAR(50)
              - column:
                  name: action
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: entity_type
                  type: VARCHAR(50)
              - column:
                  name: entity_id
                  type: VARCHAR(100)
              - column:
                  name: old_value
                  type: TEXT
              - column:
                  name: new_value
                  type: TEXT
              - column:
                  name: ip_address
                  type: VARCHAR(45)
              - column:
                  name: user_agent
                  type: VARCHAR(500)
              - column:
                  name: details
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
        - createIndex:
            indexName: idx_audit_user
            tableName: user_audit_log
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_audit_action
            tableName: user_audit_log
            columns:
              - column:
                  name: action