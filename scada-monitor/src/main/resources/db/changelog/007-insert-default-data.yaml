  - changeSet:
      id: 007-insert-demo-sensors
      author: scada-team
      changes:
        - insert:
            tableName: sensor_metadata
            columns:
              - column: { name: id, value: "temp-furnace-01" }
              - column: { name: controller_id, value: "plc-main-01" }
              - column: { name: name, value: "Furnace Temperature" }
              - column: { name: type, value: "TEMPERATURE" }
              - column: { name: unit, value: "°C" }
              - column: { name: min_value, value: 0 }
              - column: { name: max_value, value: 1200 }
              - column: { name: default_value, value: 20 }
              - column: { name: warning_low, value: 800 }
              - column: { name: warning_high, value: 1100 }
              - column: { name: alarm_low, value: 700 }
              - column: { name: alarm_high, value: 1150 }
        - insert:
            tableName: sensor_metadata
            columns:
              - column: { name: id, value: "level-tank-01" }
              - column: { name: controller_id, value: "plc-main-01" }
              - column: { name: name, value: "Tank Level" }
              - column: { name: type, value: "LEVEL" }
              - column: { name: unit, value: "%" }
              - column: { name: min_value, value: 0 }
              - column: { name: max_value, value: 100 }
              - column: { name: default_value, value: 50 }
              - column: { name: warning_low, value: 10 }
              - column: { name: warning_high, value: 90 }
              - column: { name: alarm_low, value: 5 }
              - column: { name: alarm_high, value: 95 }
        - insert:
            tableName: sensor_metadata
            columns:
              - column: { name: id, value: "pressure-line-01" }
              - column: { name: controller_id, value: "plc-main-01" }
              - column: { name: name, value: "Line Pressure" }
              - column: { name: type, value: "PRESSURE" }
              - column: { name: unit, value: "bar" }
              - column: { name: min_value, value: 0 }
              - column: { name: max_value, value: 10 }
              - column: { name: default_value, value: 4.5 }
              - column: { name: warning_low, value: 2 }
              - column: { name: warning_high, value: 8 }
              - column: { name: alarm_low, value: 1 }
              - column: { name: alarm_high, value: 9 }

  - changeSet:
      id: 007-insert-initial-states
      author: scada-team
      changes:
        - insert:
            tableName: sensor_state
            columns:
              - column: { name: sensor_id, value: "temp-furnace-01" }
              - column: { name: value, value: 850.5 }
              - column: { name: timestamp, valueComputed: "CURRENT_TIMESTAMP" }
              - column: { name: is_current, value: true }
        - insert:
            tableName: sensor_state
            columns:
              - column: { name: sensor_id, value: "level-tank-01" }
              - column: { name: fill_level, value: 65 }
              - column: { name: timestamp, valueComputed: "CURRENT_TIMESTAMP" }
              - column: { name: is_current, value: true }
        - insert:
            tableName: sensor_state
            columns:
              - column: { name: sensor_id, value: "pressure-line-01" }
              - column: { name: value, value: 4.8 }
              - column: { name: timestamp, valueComputed: "CURRENT_TIMESTAMP" }
              - column: { name: is_current, value: true }