databaseChangeLog:
  - changeSet:
      id: 003-create-sensor-metadata-table
      author: scada-team
      changes:
        - createTable:
            tableName: sensor_metadata
            remarks: "Sensor metadata from developer A"
            columns:
              - column:
                  name: id
                  type: VARCHAR(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: controller_id
                  type: VARCHAR(100)
                  remarks: "Reference to controller"
                  constraints:
                    foreignKeyName: fk_sensor_controller
                    references: controller_metadata(id)
                    deleteCascade: false
              - column:
                  name: name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: unit
                  type: VARCHAR(20)
              - column:
                  name: min_value
                  type: DOUBLE
              - column:
                  name: max_value
                  type: DOUBLE
              - column:
                  name: default_value
                  type: DOUBLE
              - column:
                  name: warning_low
                  type: DOUBLE
              - column:
                  name: warning_high
                  type: DOUBLE
              - column:
                  name: alarm_low
                  type: DOUBLE
              - column:
                  name: alarm_high
                  type: DOUBLE
              - column:
                  name: polling_interval
                  type: INTEGER
                  defaultValue: 1000
              - column:
                  name: deadband
                  type: DOUBLE
                  defaultValue: 0
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
        - createIndex:
            indexName: idx_sensor_controller
            tableName: sensor_metadata
            columns:
              - column:
                  name: controller_id
        - createIndex:
            indexName: idx_sensor_type
            tableName: sensor_metadata
            columns:
              - column:
                  name: type